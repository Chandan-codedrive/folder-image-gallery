<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>China</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/gallery.css">


</head>

<body>

    <div class="container py-5">

        

        <nav class="breadcrumb-nav mb-4">

            <a href="/">Home</a>

            
            <span>/</span>
            <a href="/asia/">Asia</a>
            

            <span>/</span>
            <span class="active">China</span>

        </nav>

        

        <h1>China</h1>

        <p class="text-secondary mb-4">
            2 Photos
        </p>

        

        

        <div class="row g-4">

            

            

            

            

            <div class="col-lg-4 col-md-6 col-12">

                <img src="/asia/china/hongkong.jpg" alt="China" class="gallery-image" loading="lazy"
                    onclick="openImage(this)">

            </div>

            

            

        </div>

    </div>

    

    <div class="modal fade" id="galleryModal" tabindex="-1">

        <div class="modal-dialog modal-xl modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-body text-center position-relative">

                    

                    <button class="btn btn-danger lightbox-close" data-bs-dismiss="modal">

                        ✕

                    </button>

                    

                    <button class="btn btn-light lightbox-prev" onclick="prevImage()">

                        ❮

                    </button>

                    

                    <img id="modalImage" class="img-fluid rounded">

                    

                    <button class="btn btn-light lightbox-next" onclick="nextImage()">

                        ❯

                    </button>

                </div>

            </div>

        </div>

    </div>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    

    <script src="/js/gallery.js"></script>

</body>

</html>
