<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>{{ .Title }}</title>

<style>

body{
    background:#111;
    color:white;
}

.country-card{
    border:none;
    overflow:hidden;
    border-radius:15px;
    transition:.3s;
    background:#1a1a1a;
}

.country-card:hover{
    transform:translateY(-6px);
}

.country-card img{
    height:250px;
    object-fit:cover;
}

</style>

</head>

<body>

<div class="container py-5">

    <nav class="breadcrumb-nav mb-4">

    <a href="/">Home</a>

    <span>/</span>

    <span class="active">{{ .Title }}</span>

</nav>

<h1 class="mb-4">{{ .Title }}</h1>

<div class="row">

{{ range .Pages }}

<div class="col-md-4 mb-4">

<a href="{{ .RelPermalink }}" class="text-decoration-none">

<div class="card country-card">

{{ $cover := .Resources.GetMatch "cover.*" }}

{{ if $cover }}
<img src="{{ $cover.RelPermalink }}" class="card-img-top">
{{ end }}

<div class="card-body">

<h5 class="text-white">
{{ .Title }}
</h5>

</div>

</div>

</a>

</div>

{{ end }}

</div>

</div>

</body>

</html>
