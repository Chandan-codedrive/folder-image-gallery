<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/home.css">
    {{ partial "styles.html" . }}
     
</head>


<body>

{{ partial "header.html" . }}

<div class="container py-5">

    <h1 class="mb-5 text-center">
        Explore Continents
    </h1>

    <div class="row g-4">

        {{ range .Pages }}

        <div class="col-md-4">

            <a href="{{ .RelPermalink }}" class="continent-card">

                <img
                    src="{{ .Params.thumbnail }}"
                    alt="{{ .Title }}">

                <div class="overlay">

                    <h3>{{ .Title }}</h3>

                </div>

            </a>

        </div>

        {{ end }}

    </div>

</div>


<!-- footer -->
 {{ partial "footer.html" . }}
</body>
</html>
